# Job search sources — used by Job Hunter scout stage (merged from job-scout)
boards:
  - name: LinkedIn Jobs
    url: https://www.linkedin.com/jobs
    priority: 1
    notes: Highest volume; filter Remote + Recent; use /jobs/view/ URLs in results

  - name: Indeed
    url: https://www.indeed.com
    priority: 2
    notes: Strong for contract and remote; filter Remote + Last 14 days

  - name: Interrupt (Memfault Jobs)
    url: https://interrupt.memfault.com/jobs
    priority: 3
    notes: Best niche board for firmware and embedded

  - name: Arc.dev — Embedded
    url: https://arc.dev/remote-jobs/embedded
    priority: 4
    notes: Remote embedded; contractor-friendly marketplace

  - name: Wellfound (AngelList)
    url: https://wellfound.com
    priority: 5
    notes: Startups — health IoT, robotics, smart home; filter Remote OK

  - name: Dice
    url: https://www.dice.com
    priority: 6
    notes: High volume; filter Contract + Remote + Embedded

keywords:
  primary:
    - embedded
    - firmware
    - IoT
    - ESP32
    - RTOS
    - connectivity
    - wearable
    - health tech
    - medical device
    - edge
    - sensor
    - BLE
    - MQTT
  secondary:
    - platform engineer
    - solutions engineer
    - contract
    - remote

filters:
  location: United States
  remote: true
  employment_types:
    - contract
    - full-time
    - part-time
  min_fit_score_to_list: 50

search_queries:
  - "site:linkedin.com/jobs embedded firmware remote United States"
  - "site:indeed.com embedded firmware IoT remote contract"
  - "remote contract embedded firmware engineer US"
  - "remote IoT firmware ESP32 jobs"
  - "site:interrupt.memfault.com firmware OR IoT"
